<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --surface: #161719;
    --surface2: #1e2023;
    --surface3: #25272b;
    --border: #2e3035;
    --border2: #3a3d44;
    --accent: #e8ff47;
    --accent2: #47d4ff;
    --accent3: #ff6b6b;
    --text: #e8eaed;
    --text2: #9aa0aa;
    --text3: #5a6070;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    /* excel grid */
    --xl-header-bg: #1d6f42;
    --xl-header-text: #ffffff;
    --xl-row-even: #1a1c1f;
    --xl-row-odd: #161719;
    --xl-row-hover: #252a30;
    --xl-border: #2e3540;
    --xl-rnum-bg: #1e2023;
    --xl-rnum-text: #5a6070;
    --xl-changed-bg: rgba(71,212,255,0.08);
    --xl-changed-border: #47d4ff;
    --xl-removed-bg: rgba(255,107,107,0.08);
  }

  :root.light {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface2: #f0f1f3;
    --surface3: #e4e6ea;
    --border: #d0d3d9;
    --border2: #b8bcc5;
    --accent: #1a6e3c;
    --accent2: #0070c0;
    --accent3: #d63b3b;
    --text: #1a1d23;
    --text2: #4a5060;
    --text3: #8a90a0;
    /* excel grid light */
    --xl-header-bg: #1d6f42;
    --xl-header-text: #ffffff;
    --xl-row-even: #ffffff;
    --xl-row-odd: #f7f8fa;
    --xl-row-hover: #e8f4ff;
    --xl-border: #c8cdd6;
    --xl-rnum-bg: #f0f1f3;
    --xl-rnum-text: #8a90a0;
    --xl-changed-bg: rgba(0,112,192,0.07);
    --xl-changed-border: #0070c0;
    --xl-removed-bg: rgba(214,59,59,0.07);
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  #topbar {
    height: 48px;
    min-height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    z-index: 10;
  }

  #topbar .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  #topbar .sep { width: 1px; height: 20px; background: var(--border); }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { background: #d4e83e; border-color: #d4e83e; color: #000; }

  #file-info { font-family: var(--mono); font-size: 11px; color: var(--text2); }
  #export-btn { margin-left: auto; }

  /* THEME TOGGLE */
  #theme-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
  }
  #theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .toggle-track {
    width: 28px; height: 15px;
    background: var(--border2);
    border-radius: 8px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-thumb {
    width: 11px; height: 11px;
    background: var(--text3);
    border-radius: 50%;
    position: absolute;
    top: 2px; left: 2px;
    transition: transform 0.2s, background 0.2s;
  }
  :root.light #theme-toggle .toggle-track { background: #1d6f42; }
  :root.light #theme-toggle .toggle-thumb { background: #fff; transform: translateX(13px); }

  /* MAIN LAYOUT */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* LEFT SIDEBAR - 10% */
  #sidebar {
    width: 10%;
    min-width: 120px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 10px 10px 8px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #columns-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .col-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
    user-select: none;
  }
  .col-item:hover { background: var(--surface2); }
  .col-item.active { background: var(--surface2); border-left-color: var(--accent); }
  .col-item.active .col-name { color: var(--accent); }

  .col-item input[type=checkbox] { display: none; }

  .col-check {
    width: 13px; height: 13px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
    background: var(--surface3);
    cursor: pointer;
  }
  .col-item.included .col-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .col-item.included .col-check::after {
    content: '';
    width: 7px; height: 5px;
    border-left: 1.5px solid #000;
    border-bottom: 1.5px solid #000;
    transform: rotate(-45deg) translateY(-1px);
  }

  .col-name {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    transition: color 0.1s;
  }

  /* drag handle */
  .drag-handle {
    cursor: grab;
    color: var(--text3);
    font-size: 10px;
    padding: 0 2px;
    flex-shrink: 0;
  }
  .drag-handle:active { cursor: grabbing; }

  /* CONTENT AREA - 90% */
  #content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* UPPER 70% */
  #upper {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* EMPTY STATE */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
  }
  #empty-state .icon { font-size: 36px; opacity: 0.4; }
  #empty-state p { font-family: var(--mono); font-size: 12px; }

  /* EDITOR PANEL */
  #editor-panel {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }

  /* VALUES SECTION (top half of right) */
  #values-section {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid var(--border);
    min-height: 0;
  }

  .section-header {
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .section-header .col-badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    background: var(--accent);
    color: #000;
    border-radius: 3px;
    font-weight: 600;
  }

  #values-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .value-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 14px;
    transition: background 0.1s;
  }
  .value-row:hover { background: var(--surface2); }

  .value-original {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .value-original .count {
    font-size: 9px;
    color: var(--text3);
    margin-left: 6px;
  }

  .arrow-icon {
    color: var(--text3);
    font-size: 11px;
    flex-shrink: 0;
  }

  .value-input {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    padding: 4px 8px;
    width: 160px;
    flex-shrink: 0;
    transition: border-color 0.15s;
    outline: none;
  }
  .value-input:focus { border-color: var(--accent2); }
  .value-input.has-value { border-color: var(--accent2); color: var(--accent2); }

  .remove-label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .remove-label input[type=checkbox] { display: none; }
  .remove-check {
    width: 13px; height: 13px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    background: var(--surface3);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .remove-label.checked .remove-check {
    background: var(--accent3);
    border-color: var(--accent3);
  }
  .remove-label.checked .remove-check::after {
    content: '×';
    color: #fff;
    font-size: 10px;
    line-height: 1;
    font-weight: 700;
  }
  .remove-label span {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .remove-label.checked span { color: var(--accent3); }

  /* BOTTOM CSV PREVIEW — EXCEL GRID */
  #csv-preview {
    height: 50%;
    min-height: 200px;
    background: var(--xl-row-even);
    border-top: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  #csv-preview .section-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  #excel-wrap {
    flex: 1;
    overflow: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
    position: relative;
  }

  #excel-table {
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 11px;
    min-width: 100%;
    table-layout: fixed;
  }

  /* Row number corner */
  #excel-table thead tr th:first-child {
    background: var(--xl-rnum-bg);
    border-right: 2px solid var(--xl-border);
    border-bottom: 2px solid var(--xl-border);
    width: 42px;
    min-width: 42px;
    max-width: 42px;
    position: sticky;
    top: 0;
    left: 0;
    z-index: 3;
  }

  /* Header cells */
  #excel-table thead tr th {
    background: var(--xl-header-bg);
    color: var(--xl-header-text);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 0 10px;
    height: 26px;
    text-align: left;
    position: sticky;
    top: 0;
    z-index: 2;
    border-right: 1px solid rgba(255,255,255,0.15);
    border-bottom: 2px solid rgba(0,0,0,0.2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 100px;
  }

  /* Row number cells */
  #excel-table td.rnum {
    background: var(--xl-rnum-bg);
    color: var(--xl-rnum-text);
    font-size: 10px;
    text-align: right;
    padding: 0 6px 0 0;
    height: 22px;
    border-right: 2px solid var(--xl-border);
    border-bottom: 1px solid var(--xl-border);
    position: sticky;
    left: 0;
    z-index: 1;
    user-select: none;
    width: 42px;
    min-width: 42px;
  }

  /* Data cells */
  #excel-table td {
    padding: 0 10px;
    height: 22px;
    border-right: 1px solid var(--xl-border);
    border-bottom: 1px solid var(--xl-border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
    color: var(--text2);
    transition: background 0.08s;
  }

  #excel-table tbody tr:nth-child(even) td { background: var(--xl-row-even); }
  #excel-table tbody tr:nth-child(odd) td { background: var(--xl-row-odd); }
  #excel-table tbody tr:hover td { background: var(--xl-row-hover) !important; }

  #excel-table tbody tr:nth-child(even) td.rnum,
  #excel-table tbody tr:nth-child(odd) td.rnum { background: var(--xl-rnum-bg) !important; }

  /* Changed cells */
  #excel-table td.cell-changed {
    color: var(--accent2);
    background: var(--xl-changed-bg) !important;
    border-bottom-color: var(--xl-changed-border);
  }
  #excel-table td.cell-removed {
    color: var(--accent3);
    background: var(--xl-removed-bg) !important;
    font-style: italic;
    text-decoration: line-through;
    opacity: 0.7;
  }

  /* Column letter row (like Excel A B C D) */
  #excel-col-letters {
    display: flex;
    background: var(--xl-rnum-bg);
    border-bottom: 1px solid var(--xl-border);
    font-family: var(--mono);
    font-size: 9px;
    color: var(--xl-rnum-text);
    position: sticky;
    top: 26px;
    z-index: 2;
  }

  /* UPLOAD OVERLAY */
  #upload-overlay {
    position: fixed; inset: 0;
    background: rgba(14,15,17,0.97);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
  }

  .upload-box {
    border: 1.5px dashed var(--border2);
    border-radius: 8px;
    padding: 48px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
  }
  .upload-box:hover, .upload-box.drag-over {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .upload-box .upload-icon { font-size: 40px; color: var(--accent); opacity: 0.8; }
  .upload-box h2 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }
  .upload-box p {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }

  input[type=file] { display: none; }

  /* scrollbar global */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--surface3);
    color: var(--text3);
    letter-spacing: 0.04em;
  }

  /* drag ghost */
  .col-item.dragging { opacity: 0.4; }
  .col-item.drag-over-top { border-top: 2px solid var(--accent); }
  .col-item.drag-over-bottom { border-bottom: 2px solid var(--accent); }
</style>
</head>
<body>

<!-- UPLOAD OVERLAY -->
<div id="upload-overlay">
  <div class="upload-box" id="upload-box">
    <div class="upload-icon">⬆</div>
    <h2>Drop CSV file here</h2>
    <p>or click to browse</p>
    <button class="btn primary" onclick="document.getElementById('file-input').click()">Choose File</button>
  </div>
  <p style="font-family:var(--mono);font-size:10px;color:var(--text3);">Supported: .csv — all processing is local, nothing is uploaded</p>
  <input type="file" id="file-input" accept=".csv">
</div>

<!-- TOP BAR -->
<div id="topbar">
  <span class="logo">CSV//EDIT</span>
  <div class="sep"></div>
  <span id="file-info">no file loaded</span>
  <button class="btn" id="change-file-btn" style="display:none" onclick="document.getElementById('file-input2').click()">↑ Replace File</button>
  <input type="file" id="file-input2" accept=".csv">
  <div id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark">
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    <span id="theme-label">Dark</span>
  </div>
  <button class="btn primary" id="export-btn" style="display:none" onclick="exportCSV()">↓ Export CSV</button>
</div>

<!-- MAIN -->
<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">Columns</div>
    <div id="columns-list"></div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div id="upper">
      <!-- EMPTY STATE -->
      <div id="empty-state">
        <div class="icon">⬡</div>
        <p>Select a column from the left</p>
      </div>

      <!-- EDITOR PANEL -->
      <div id="editor-panel">
        <!-- VALUES SECTION -->
        <div id="values-section">
          <div class="section-header">
            <span>Unique Values</span>
            <span class="col-badge" id="active-col-badge">—</span>
            <span class="badge" id="unique-count-badge"></span>
          </div>
          <div id="values-list"></div>
        </div>

      </div>
    </div>

    <!-- CSV PREVIEW — EXCEL GRID -->
    <div id="csv-preview">
      <div class="section-header">
        <span>📊 Live Preview</span>
        <span id="xl-row-count" class="badge" style="margin-left:8px"></span>
        <span style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-left:auto">
          Highlighted cells = edited · column visibility &amp; order from sidebar
        </span>
      </div>
      <div id="excel-wrap">
        <table id="excel-table">
          <thead><tr id="excel-thead-row"></tr></thead>
          <tbody id="excel-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────
let rawData = [];        // array of row-objects, original
let columns = [];        // ordered column names
let colVisible = {};     // colName → bool (included in export)
let replacements = {};   // colName → { value → { replace: string, remove: bool } }
let activeCol = null;

// ─── CSV PARSER ───────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return { columns: [], data: [] };

  const parseLine = line => {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    result.push(cur.trim());
    return result;
  };

  const headers = parseLine(lines[0]);
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseLine(lines[i]);
    if (vals.every(v => !v)) continue;
    const row = {};
    headers.forEach((h, idx) => row[h] = vals[idx] !== undefined ? vals[idx] : '');
    data.push(row);
  }
  return { columns: headers, data };
}

// ─── LOAD FILE ────────────────────────────────────────────────────────
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const { columns: cols, data } = parseCSV(e.target.result);
    if (!cols.length) return alert('Could not parse CSV.');
    rawData = data;
    columns = [...cols];
    colVisible = {};
    replacements = {};
    activeCol = null;
    cols.forEach(c => { colVisible[c] = true; replacements[c] = {}; });
    document.getElementById('file-info').textContent =
      `${file.name}  ·  ${data.length} rows  ·  ${cols.length} cols`;
    document.getElementById('upload-overlay').style.display = 'none';
    document.getElementById('change-file-btn').style.display = '';
    document.getElementById('export-btn').style.display = '';
    renderSidebar();
    renderCSVPreview();
    showEmpty();
  };
  reader.readAsText(file);
}

// ─── REPLACEMENTS HELPERS ─────────────────────────────────────────────
function getEdited(colName, originalVal) {
  // originalVal may be a multi-value cell: "a, b, c"
  // We need to apply per-value replacements
  if (!originalVal) return '';
  const colRep = replacements[colName] || {};
  
  // Parse multi-value (comma-separated quoted strings)
  const parts = parseMultiValue(originalVal);
  const editedParts = [];
  let changed = false;

  for (const part of parts) {
    const rep = colRep[part];
    if (rep && rep.remove) { changed = true; continue; }
    if (rep && rep.replace.trim() !== '') { editedParts.push(rep.replace); changed = true; }
    else editedParts.push(part);
  }

  return { value: editedParts.join(', '), changed };
}

function parseMultiValue(val) {
  // Handles: "Buyer", "Tenant", Expat  or simple: Interested in buying
  val = val.trim();
  // Try to split by comma respecting quotes
  const parts = [];
  let cur = '', inQ = false;
  for (let i = 0; i < val.length; i++) {
    const c = val[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { parts.push(cur.trim().replace(/^"|"$/g, '')); cur = ''; }
    else cur += c;
  }
  parts.push(cur.trim().replace(/^"|"$/g, ''));
  return parts.filter(p => p !== '');
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('columns-list');
  list.innerHTML = '';

  columns.forEach((col, idx) => {
    const item = document.createElement('div');
    item.className = 'col-item' +
      (colVisible[col] ? ' included' : '') +
      (activeCol === col ? ' active' : '');
    item.dataset.col = col;
    item.draggable = true;

    item.innerHTML = `
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <span class="col-check" data-check="${col}"></span>
      <span class="col-name" title="${col}">${col}</span>
    `;

    // checkbox toggle
    item.querySelector('.col-check').addEventListener('click', e => {
      e.stopPropagation();
      colVisible[col] = !colVisible[col];
      renderSidebar();
      renderCSVPreview();
    });

    // select column
    item.addEventListener('click', () => selectColumn(col));

    // drag
    setupDrag(item);

    list.appendChild(item);
  });
}

// ─── DRAG & DROP (sidebar reorder) ────────────────────────────────────
let dragSrc = null;

function setupDrag(item) {
  item.addEventListener('dragstart', e => {
    dragSrc = item;
    setTimeout(() => item.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  item.addEventListener('dragend', () => {
    item.classList.remove('dragging');
    document.querySelectorAll('.col-item').forEach(i => {
      i.classList.remove('drag-over-top', 'drag-over-bottom');
    });
  });
  item.addEventListener('dragover', e => {
    e.preventDefault();
    if (item === dragSrc) return;
    const rect = item.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    document.querySelectorAll('.col-item').forEach(i => i.classList.remove('drag-over-top','drag-over-bottom'));
    if (e.clientY < mid) item.classList.add('drag-over-top');
    else item.classList.add('drag-over-bottom');
  });
  item.addEventListener('drop', e => {
    e.preventDefault();
    if (!dragSrc || dragSrc === item) return;
    const srcCol = dragSrc.dataset.col;
    const tgtCol = item.dataset.col;
    const srcIdx = columns.indexOf(srcCol);
    const tgtIdx = columns.indexOf(tgtCol);
    const rect = item.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    columns.splice(srcIdx, 1);
    let newIdx = columns.indexOf(tgtCol);
    if (e.clientY >= mid) newIdx += 1;
    columns.splice(newIdx, 0, srcCol);
    renderSidebar();
    renderCSVPreview();
  });
}

// ─── SELECT COLUMN ────────────────────────────────────────────────────
function selectColumn(col) {
  activeCol = col;
  document.getElementById('empty-state').style.display = 'none';
  const panel = document.getElementById('editor-panel');
  panel.style.display = 'flex';

  document.getElementById('active-col-badge').textContent = col;

  renderValuesList(col);
  renderSidebar();
}

function showEmpty() {
  activeCol = null;
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('editor-panel').style.display = 'none';
  renderSidebar();
}

// ─── VALUES LIST ──────────────────────────────────────────────────────
function getUniqueValues(col) {
  const counts = {};
  rawData.forEach(row => {
    const parts = parseMultiValue(row[col] || '');
    parts.forEach(p => { if (p) counts[p] = (counts[p] || 0) + 1; });
  });
  return counts;
}

function renderValuesList(col) {
  const counts = getUniqueValues(col);
  const sortedVals = Object.keys(counts).sort((a,b) => counts[b]-counts[a]);
  document.getElementById('unique-count-badge').textContent =
    sortedVals.length + ' unique';

  const list = document.getElementById('values-list');
  list.innerHTML = '';
  if (!replacements[col]) replacements[col] = {};

  sortedVals.forEach(val => {
    const rep = replacements[col][val] || { replace: '', remove: false };
    const row = document.createElement('div');
    row.className = 'value-row';

    const removeChecked = rep.remove;
    row.innerHTML = `
      <span class="value-original">${escHtml(val)}<span class="count">×${counts[val]}</span></span>
      <span class="arrow-icon">→</span>
      <input class="value-input${rep.replace ? ' has-value' : ''}"
             type="text" placeholder="replacement…"
             value="${escHtml(rep.replace)}"
             data-val="${escHtml(val)}" data-col="${escHtml(col)}"
             ${removeChecked ? 'disabled' : ''}>
      <label class="remove-label${removeChecked ? ' checked' : ''}">
        <input type="checkbox" ${removeChecked ? 'checked' : ''} data-val="${escHtml(val)}" data-col="${escHtml(col)}">
        <span class="remove-check"></span>
        <span>Remove</span>
      </label>
    `;

    const inp = row.querySelector('input[type=text]');
    const chk = row.querySelector('input[type=checkbox]');
    const lbl = row.querySelector('.remove-label');

    inp.addEventListener('input', () => {
      if (!replacements[col][val]) replacements[col][val] = { replace: '', remove: false };
      replacements[col][val].replace = inp.value;
      inp.classList.toggle('has-value', !!inp.value);
      refreshPreviews(col);
    });

    chk.addEventListener('change', () => {
      if (!replacements[col][val]) replacements[col][val] = { replace: '', remove: false };
      replacements[col][val].remove = chk.checked;
      lbl.classList.toggle('checked', chk.checked);
      inp.disabled = chk.checked;
      refreshPreviews(col);
    });

    list.appendChild(row);
  });
}


function refreshPreviews(col) {
  renderCSVPreview();
}

// ─── THEME TOGGLE ─────────────────────────────────────────────────────
function toggleTheme() {
  const root = document.documentElement;
  const isLight = root.classList.toggle('light');
  document.getElementById('theme-label').textContent = isLight ? 'Light' : 'Dark';
}

// ─── EXCEL GRID PREVIEW ───────────────────────────────────────────────
function renderCSVPreview() {
  const visibleCols = columns.filter(c => colVisible[c]);
  const theadRow = document.getElementById('excel-thead-row');
  const tbody = document.getElementById('excel-tbody');
  theadRow.innerHTML = '';
  tbody.innerHTML = '';

  if (!visibleCols.length || !rawData.length) {
    document.getElementById('xl-row-count').textContent = '';
    return;
  }

  // Header: corner + column names
  const corner = document.createElement('th');
  corner.textContent = '#';
  theadRow.appendChild(corner);

  visibleCols.forEach(col => {
    const th = document.createElement('th');
    th.textContent = col;
    th.title = col;
    theadRow.appendChild(th);
  });

  // Data rows
  const max = rawData.length;
  document.getElementById('xl-row-count').textContent = rawData.length + ' rows';

  for (let i = 0; i < max; i++) {
    const row = rawData[i];
    const tr = document.createElement('tr');

    // row number
    const rnum = document.createElement('td');
    rnum.className = 'rnum';
    rnum.textContent = i + 1;
    tr.appendChild(rnum);

    visibleCols.forEach(col => {
      const orig = row[col] || '';
      const { value: edited, changed } = getEdited(col, orig);
      const td = document.createElement('td');

      if (changed) {
        const wasRemoved = edited === '' && orig !== '';
        td.className = wasRemoved ? 'cell-removed' : 'cell-changed';
        td.textContent = wasRemoved ? orig : edited;
        td.title = wasRemoved
          ? `REMOVED: "${orig}"`
          : `EDITED: "${orig}" → "${edited}"`;
      } else {
        td.textContent = orig;
        td.title = orig;
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  }

}

// ─── EXPORT ──────────────────────────────────────────────────────────
function exportCSV() {
  const visibleCols = columns.filter(c => colVisible[c]);
  const lines = [];
  lines.push(visibleCols.map(quoteIfNeeded).join(','));
  rawData.forEach(row => {
    const parts = visibleCols.map(col => {
      const orig = row[col] || '';
      const { value } = getEdited(col, orig);
      return quoteIfNeeded(value);
    });
    lines.push(parts.join(','));
  });
  const blob = new Blob([lines.join('\r\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'edited.csv';
  a.click();
}

// ─── UTILS ───────────────────────────────────────────────────────────
function quoteIfNeeded(v) {
  if (!v) return '';
  if (v.includes(',') || v.includes('"') || v.includes('\n')) {
    return '"' + v.replace(/"/g, '""') + '"';
  }
  return v;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── FILE INPUT EVENTS ────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});
document.getElementById('file-input2').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

// drag-drop onto upload box
const uploadBox = document.getElementById('upload-box');
uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('drag-over'); });
uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('drag-over'));
uploadBox.addEventListener('drop', e => {
  e.preventDefault();
  uploadBox.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
// drag-drop anywhere on page
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.csv')) loadFile(f);
});
</script>
