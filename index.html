<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0b0a;
    --grid: rgba(255,255,255,0.03);
    --accent-csv: #d4f53c;
    --accent-vcard: #ff5c35;
    --text: #f0ede4;
    --text2: #7a766c;
    --mono: 'DM Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --sans: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── GLOW ORBS ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.18;
  }
  .orb-1 {
    width: 600px; height: 600px;
    background: var(--accent-csv);
    top: -200px; left: -100px;
    animation: drift1 18s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 500px; height: 500px;
    background: var(--accent-vcard);
    bottom: -180px; right: -80px;
    animation: drift2 14s ease-in-out infinite alternate;
  }

  @keyframes drift1 {
    from { transform: translate(0, 0); }
    to   { transform: translate(60px, 40px); }
  }
  @keyframes drift2 {
    from { transform: translate(0, 0); }
    to   { transform: translate(-50px, -30px); }
  }

  /* ── WRAPPER ── */
  .wrapper {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 32px;
  }

  /* ── EYEBROW ── */
  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.1s;
  }

  /* ── HEADLINE ── */
  h1 {
    font-family: var(--display);
    font-size: clamp(64px, 10vw, 120px);
    font-weight: 400;
    letter-spacing: 0.02em;
    line-height: 0.92;
    text-align: center;
    color: var(--text);
    margin-bottom: 14px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.2s;
  }
  h1 span.hi { color: var(--accent-csv); }

  .subtitle {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.06em;
    margin-bottom: 60px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.3s;
  }

  /* ── BUTTONS ── */
  .tools {
    display: flex;
    gap: 20px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
    animation-delay: 0.45s;
  }

  .tool-btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding: 28px 32px;
    width: 220px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    backdrop-filter: blur(6px);
    overflow: hidden;
  }

  /* shine sweep on hover */
  .tool-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .tool-btn:hover::before { transform: translateX(100%); }

  .tool-btn:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,0.055);
  }

  .tool-btn.csv:hover { border-color: var(--accent-csv); }
  .tool-btn.vcard:hover { border-color: var(--accent-vcard); }

  /* accent top bar */
  .tool-btn::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .tool-btn.csv::after { background: var(--accent-csv); }
  .tool-btn.vcard::after { background: var(--accent-vcard); }
  .tool-btn:hover::after { opacity: 1; }

  .tool-icon {
    font-size: 26px;
    line-height: 1;
  }

  .tool-label {
    font-family: var(--display);
    font-size: 26px;
    letter-spacing: 0.04em;
    line-height: 1;
    transition: color 0.2s;
  }
  .tool-btn.csv:hover .tool-label { color: var(--accent-csv); }
  .tool-btn.vcard:hover .tool-label { color: var(--accent-vcard); }

  .tool-desc {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  .tool-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    margin-top: 4px;
    font-weight: 500;
  }
  .tool-btn.csv .tool-tag { background: rgba(212,245,60,0.1); color: var(--accent-csv); }
  .tool-btn.vcard .tool-tag { background: rgba(255,92,53,0.1); color: var(--accent-vcard); }

  /* ── FOOTER ── */
  .footer {
    position: fixed;
    bottom: 24px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    animation-delay: 0.7s;
    gap: 20px;
  }
  .footer span { opacity: 0.4; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrapper">
  <p class="eyebrow">Local · Private · Fast</p>

  <h1>DATA<br><span class="hi">TOOLS</span></h1>

  <p class="subtitle">Browser-based file editors — nothing leaves your device</p>

  <div class="tools">

    <button class="tool-btn csv" onclick="">
      <div class="tool-icon">⬡</div>
      <div class="tool-label">EDIT CSV</div>
      <div class="tool-desc">Filter, replace &amp; clean<br>CSV files visually</div>
      <div class="tool-tag">.csv</div>
    </button>

    <button class="tool-btn vcard" onclick="">
      <div class="tool-icon">📇</div>
      <div class="tool-label">vCARD → CSV</div>
      <div class="tool-desc">Convert &amp; edit vCard<br>contacts to CSV</div>
      <div class="tool-tag">.vcf → .csv</div>
    </button>

  </div>
</div>

<div class="footer">
  <span>All processing is local</span>
  &nbsp;·&nbsp;
  <span>No uploads · No tracking</span>
</div>

</body>
</html>
